<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Admin Dashboard | BR30trader</title>

    <!-- Private page security -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- No cache (important for analytics data) -->
    <meta
      http-equiv="Cache-Control"
      content="no-store, no-cache, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Favicon -->
    <link
      rel="icon"
      href="https://i.ibb.co/JRJ2Dv9W/BR30-LOGO.jpg"
      type="image/png"
    />

    <!-- Font Awesome (FIXED) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="../assets/css/dashboard.css">

    <!-- Optional Open Graph -->
    <meta property="og:title" content="Seller Analytics | BR30 Kart" />
    <meta
      property="og:description"
      content="Private seller analytics dashboard for BR30 Kart sellers."
    />
    <meta
      property="og:image"
      content="https://i.ibb.co/JRJ2Dv9W/BR30-LOGO.jpg"
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BR30 Kart" />

   
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-TT7SLZ4L"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->
    <!-- Updated Sidebar Menu with 5 Pro Buttons -->
    <div class="sidebar">
      <div class="logo">
        <i class="fas fa-rocket"></i>
        BR30 ANALYTICS
      </div>
      <nav>
        <!-- 1. Overview Button -->
        <button class="side-btn active" onclick="loadSection('overview')">
          <i class="fas fa-th-large"></i>
          Overview
        </button>
<!-- user managment button -->
       <button class="side-btn" onclick="location.href='pages/admin2.html'">
  <i class="fa-solid fa-gauge"></i>
  User Management (Admin 2)
</button>

        <!-- 2. user managment button -->
       <button class="side-btn" onclick="location.href='pages/review.html'">
  <i class="fa-solid fa-clock-rotate-left"></i>
  Review Management
</button>

     <!-- 3. Course Edit Button -->
<button class="side-btn" onclick="location.href='pages/courseedit.html'">
  <i class="fa-solid fa-wallet"></i>
  Course Edit
</button>

   <!-- 4. Load Course Button -->
<button class="side-btn" onclick="location.href='pages/admin.html'">
  <i class="fa-solid fa-star"></i>
  Load Course
</button>

     <!-- 5. Admin Alert Button -->
<button class="side-btn" onclick="location.href='pages/admin-alerts.html'">
  <i class="fa-solid fa-bell"></i>
  Admin Alert
</button>

        <!-- 6. Bulk Email Button -->
<button class="side-btn" onclick="location.href='pages/email.html'">
  <i class="fa-solid fa-envelope"></i>
  Bulk Email
</button>

        <!-- Divider Line -->
        <hr style="border: 0.5px solid #222; margin: 20px 0" />

        <!-- 5. Back to Dashboard Button (Yellowish for Focus) -->
     <button 
  class="side-btn"
  style="color:#ffca28; animation:blink 1s infinite;"
  onclick="window.open('index.html','_blank')"
>
  <i class="fas fa-arrow-alt-circle-left"></i>
  Back to Home
</button>

<style>
@keyframes blink {
  0%,100% { opacity:1; }
  50% { opacity:0.5; }
}
</style>
      </nav>
    </div>

    <div class="main-content">
      <div class="header">
        <h2 style="font-size: 20px; letter-spacing: 0.5px">
         👑 Master Admin Dashboard 
        </h2>
        <div class="filter-section">
          <input type="date" id="startDate" class="bright-date" />
          <input type="date" id="endDate" class="bright-date" />
          <button
            id="filterBtn"
            class="btn-action update-btn"
            onclick="fetchAnalyticsData()"
          >
            Apply
          </button>

          <button class="btn-action reset-btn" onclick="resetFilters()">
            <i class="fas fa-sync-alt"></i>
          </button>
          <button class="btn-action pdf-btn" onclick="downloadPDF()">
            <i class="fas fa-file-excel"></i>
            PDF
          </button>
          <button class="btn-action csv-btn" onclick="exportCSV()">
            <i class="fas fa-file-excel"></i>
            CSV
          </button>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card blue">
          <h3>TOTAL USER</h3>
          <p id="total-count">₹0</p>
        </div>
        <div class="stat-card green">
          <h3>VIP</h3>
          <p id="vip-count">₹0</p>
        </div>
        <div class="stat-card yellow">
          <h3>NORMAL</h3>
          <p id="normal-count">₹0</p>
        </div>
        <div class="stat-card red">
          <h3>Platfrom Fee (20%)</h3>
          <p id="adminFee">₹1,680</p>
        </div>
      </div>

<!-- ✉️ Marketing & Coupon Management -->
<div class="marketing-card">
    <h4><i class="fas fa-bullhorn"></i> BULK MARKETING</h4>

    <select id="mail-target" class="marketing-input">
        <option value="all">Target: All Users</option>
        <option value="vip">Target: VIP Only</option>
        <option value="normal">Target: Normal Only</option>
    </select>

    <input type="text" id="mail-subject" placeholder="Offer Subject (e.g. 30% OFF)" class="marketing-input">

    <textarea id="mail-body" placeholder="Message... (HTML Allowed)" class="marketing-input text-area"></textarea>

    <button onclick="sendBulkMail()" id="send-btn" class="blast-btn">
        🚀 Send Blast Now
    </button>

    <!-- Coupon Control Section -->
    <div class="coupon-box">
        <button onclick="cancelActiveCoupon()" id="cancel-btn">
            🚫 Cancel Active Coupon
        </button>
        <p id="coupon-status">(Stop current website discount instantly)</p>
    </div>
</div>
   <script src="../js/config.js"></script>
    <script src="../js/security.js"></script>
      <script src="../js/dashboard.js"></script>
  </body>
</html>
